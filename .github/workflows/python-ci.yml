# ✨ Python CI — shared-workflows
# Lint + test for Python projects using the Astral stack (uv, ruff).

name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version'
        type: string
        default: '3.13'
      ruff:
        description: 'Run ruff lint + format check'
        type: boolean
        default: true
      pytest:
        description: 'Run pytest'
        type: boolean
        default: true
      pytest-args:
        description: 'Extra pytest arguments'
        type: string
        default: ''
      system-deps:
        description: 'apt packages needed for native extensions'
        type: string
        default: ''
      rust-toolchain:
        description: 'Install Rust toolchain'
        type: boolean
        default: false

env:
  UV_SYSTEM_PYTHON: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        if: inputs.system-deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.system-deps }}

      - name: Install Rust
        if: inputs.rust-toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        if: inputs.ruff
        run: uv run ruff check .

      - name: Ruff format check
        if: inputs.ruff
        run: uv run ruff format --check .

      - name: Run tests
        if: inputs.pytest
        run: uv run pytest ${{ inputs.pytest-args }}
