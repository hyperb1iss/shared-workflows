# ✨ Moon CI — shared-workflows
# Polyglot moonrepo workspace CI (Node + Python).

name: Moon CI

on:
  workflow_call:
    inputs:
      system-deps:
        description: 'apt packages to install'
        type: string
        default: ''
      uv-sync:
        description: 'Run uv sync before tasks'
        type: boolean
        default: false
      uv-sync-args:
        description: 'Extra uv sync args (e.g., --all-extras)'
        type: string
        default: ''
      env-vars:
        description: 'KEY=VALUE lines injected into GITHUB_ENV'
        type: string
        default: ''
      moon-commands:
        description: 'Newline-separated moon commands (preferred over moon-tasks)'
        type: string
        default: ''
      moon-tasks:
        description: 'Space-separated tasks passed to moon ci (backward compat)'
        type: string
        default: 'check'
      node-version:
        description: 'Node.js version'
        type: string
        default: '24'
      python-version:
        description: 'Python version'
        type: string
        default: '3.13'
      pnpm-version:
        description: 'pnpm version'
        type: string
        default: '10'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install system dependencies
        if: inputs.system-deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.system-deps }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Setup moon
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      # Proto would otherwise shadow the native setup-* installs above.
      - name: Remove proto shims
        run: rm -f "$HOME/.proto/shims"/{node,pnpm,uv,python}* 2>/dev/null || true

      - name: Restore moon cache
        id: moon-cache
        uses: actions/cache/restore@v4
        with:
          path: .moon/cache
          key: moon-${{ runner.os }}-${{ hashFiles('.prototools', 'uv.lock', 'pnpm-lock.yaml') }}
          restore-keys: moon-${{ runner.os }}-

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        if: inputs.uv-sync
        run: uv sync ${{ inputs.uv-sync-args }}

      - name: Inject environment variables
        if: inputs.env-vars != ''
        run: |
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "$line" >> "$GITHUB_ENV"
          done <<'ENVEOF'
          ${{ inputs.env-vars }}
          ENVEOF

      - name: Run moon commands
        if: inputs.moon-commands != ''
        run: |
          while IFS= read -r cmd; do
            [ -z "$cmd" ] && continue
            if [[ "$cmd" != moon* ]]; then
              echo "::error::Command must start with 'moon': $cmd"
              exit 1
            fi
            echo "▸ $cmd"
            bash -c "$cmd"
          done <<'CMDEOF'
          ${{ inputs.moon-commands }}
          CMDEOF

      - name: Run moon ci
        if: inputs.moon-commands == ''
        run: moon ci ${{ inputs.moon-tasks }}

      - name: Save moon cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: .moon/cache
          key: ${{ steps.moon-cache.outputs.cache-primary-key }}
