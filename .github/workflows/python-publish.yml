# ✨ Python Publish — shared-workflows
# Publish to PyPI via trusted publishing (OIDC).
# Supports single-package and multi-package workspace builds.

name: Python Publish

on:
  workflow_call:
    inputs:
      package-dir:
        description: 'Directory containing pyproject.toml (single-package mode)'
        type: string
        default: '.'
      package-names:
        description: 'Space-separated package names for uv build --package (workspace mode)'
        type: string
        default: ''
      checkout-ref:
        description: 'Git ref to checkout (empty = caller ref)'
        type: string
        default: ''

permissions:
  contents: read
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Build workspace packages
        if: inputs.package-names != ''
        run: |
          for pkg in ${{ inputs.package-names }}; do
            echo "Building $pkg..."
            uv build --package "$pkg" --out-dir dist/
          done
          ls -la dist/

      - name: Build package
        if: inputs.package-names == ''
        working-directory: ${{ inputs.package-dir }}
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ inputs.package-names != '' && 'dist/' || format('{0}/dist/', inputs.package-dir) }}
